<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSpend AI — Create Account</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-page">
    <span class="deco-flower deco-tl">🌿</span>
    <span class="deco-flower deco-tr">🌱</span>
    <span class="deco-flower deco-bl">🌷</span>
    <span class="deco-flower deco-br">🌼</span>

    <div class="auth-card onboard-card">
      <div class="auth-brand">
        <span class="brand-mark">$</span>
        <span class="brand-name">SmartSpend<em>AI</em></span>
      </div>

      <h1 class="auth-welcome">Create your account 👋</h1>
      <p class="auth-sub">A few details so we can personalize your dashboard.</p>

      <form id="onboardingForm" class="auth-form">
        <label>Full Name
          <input type="text" id="obName" required />
        </label>
        <label>Email
          <input type="email" id="obEmail" placeholder="you@example.com" required />
        </label>
        <label>Password
          <input type="password" id="obPassword" placeholder="At least 6 characters" required minlength="6" />
        </label>
        <label>Age
          <input type="number" id="obAge" min="13" max="100" required />
        </label>
        <label>Profession
          <select id="obProfession" required>
            <option value="">Select one</option>
            <option>Student</option>
            <option>Salaried Employee</option>
            <option>Freelancer</option>
            <option>Business Owner</option>
            <option>Other</option>
          </select>
        </label>
        <label>Monthly Income (₹)
          <input type="number" id="obIncome" min="0" step="500" placeholder="e.g. 45000" required />
        </label>
        <p class="auth-error" id="onboardError"></p>
        <button type="submit" class="btn-auth-submit">Create Account 🌱</button>
      </form>

      <p class="auth-footnote">Already have an account? <a href="login.html" class="auth-link">Log in</a></p>
    </div>
  </div>

  <div class="flower-rain" id="flowerRain"></div>

  <script src="js/auth.js"></script>
  <script src="js/onboarding.js"></script>
</body>
</html>
